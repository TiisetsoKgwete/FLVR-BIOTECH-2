<ion-content class="page-content">
  <section class="section-inner">
    <span class="eyebrow">Contact</span>
    <h1>Partner with us</h1>
    <p>Whether you're a researcher, investor, or change-maker — we want to work with you. Reach out to start a conversation about building a more secure food future together.</p>
    <form>
      <ion-item>
        <ion-label position="floating">Name</ion-label>
        <ion-input type="text" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Message</ion-label>
        <ion-textarea required></ion-textarea>
      </ion-item>
      <ion-button expand="block" type="submit" color="success">Send Message</ion-button>
    </form>
  </section>
</ion-content>

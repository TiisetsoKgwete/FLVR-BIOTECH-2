<ion-app>
  <!-- FPS Counter for performance monitoring -->
  <app-fps-counter></app-fps-counter>
  
  <!-- ── Sidebar menu ──────────────────────────────── -->

  <!-- Sidebar menu: icons only -->

  <ion-menu contentId="main-content" menuId="main-menu" side="start" type="push">
    <ion-header class="menu-header">
      <ion-toolbar>
        <div class="menu-logo">
          <ion-icon name="leaf"></ion-icon><span class="logo-sub">BIOTECH</span>
        </div>
      </ion-toolbar>
    </ion-header>
    <ion-content class="menu-content icons-only">
      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false" *ngFor="let p of menuPages">
          <ion-item
            [routerLink]="p.url"
            routerLinkActive="active-item"
            routerDirection="root"
            detail="false"
            class="menu-item icon-only">
            <div class="menu-item-content">
              <ion-icon [name]="p.icon"></ion-icon>
              <span class="menu-label">{{ p.title }}</span>
            </div>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
      <div class="menu-footer">
        <p>Part of the <strong>Flavuor</strong> ecosystem</p>
      </div>
    </ion-content>
  </ion-menu>


  <!-- Top navigation bar (always visible above router outlet) -->

  <ion-header class="top-nav">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>FLVR BIOTECH</ion-title>
      
      <!-- Dark mode toggle -->
      <ion-buttons slot="end">
        <ion-button 
          (click)="toggleDarkMode()" 
          class="theme-toggle"
          fill="clear"
          [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
          <ion-icon [name]="isDarkMode ? 'sunny-outline' : 'moon-outline'"></ion-icon>
        </ion-button>
      </ion-buttons>
      
      <!-- Horizontal navigation pills -->
      <ion-buttons slot="end" class="nav-pills">
        <ion-button 
          *ngFor="let p of menuPages" 
          [routerLink]="p.url" 
          routerLinkActive="nav-active"
          routerDirection="root"
          fill="outline"
          class="nav-pill">
          {{ p.title }}
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
